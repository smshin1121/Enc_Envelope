{% extends "base.html" %}
{% block title %}키 조각 제출 - 피압수자{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h3 class="mb-4">피압수자 키 조각 제출 (키 조각 1)</h3>

        <form method="POST" action="{{ url_for('suspect.upload_share_page') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="mb-3">
                <label for="seal_id" class="form-label required">봉인 ID</label>
                <input type="text" class="form-control" id="seal_id" name="seal_id"
                       value="{{ seal_id }}" {% if seal_id %}readonly{% endif %} required>
            </div>
            <div class="mb-3">
                <label for="share_data" class="form-label required">키 조각 데이터</label>
                <textarea class="form-control" id="share_data" name="share_data"
                          rows="3" placeholder="봉인 시 발급받은 키 조각 문자열을 입력해 주세요" required></textarea>
            </div>

            <button type="submit" class="btn btn-success">키 조각 제출</button>
        </form>

        <div class="security-warning">
            <h6>안내사항</h6>
            <ul>
                <li>키 조각은 봉인 시 발급받은 저장매체에서 확인할 수 있습니다.</li>
                <li>키 조각 제출 후, 수사관이 봉인해제 절차를 진행합니다.</li>
            </ul>
        </div>
    </div>
</div>
{% endblock %}
