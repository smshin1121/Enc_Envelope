{% extends "base.html" %}
{% block title %}비상 복구 - 관리자{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h3 class="mb-4">비상 키 복구</h3>
        <div class="alert alert-warning" role="alert">
            비상 복구는 관리자 키 조각(4)과 다른 키 조각 1개를 사용하여
            AES 키를 복원합니다. 복구 사유가 기록됩니다.
        </div>

        <form method="POST" action="{{ url_for('admin.emergency_recover') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="mb-3">
                <label for="seal_id" class="form-label required">봉인 ID</label>
                <input type="text" class="form-control" id="seal_id" name="seal_id" required>
            </div>
            <div class="mb-3">
                <label for="reason" class="form-label required">복구 사유</label>
                <textarea class="form-control" id="reason" name="reason" rows="3"
                          placeholder="비상 복구 사유를 상세히 입력해 주세요" required></textarea>
            </div>

            <button type="submit" class="btn btn-danger">비상 복구 실행</button>
        </form>
    </div>
</div>
{% endblock %}
